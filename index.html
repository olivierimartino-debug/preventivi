<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Preventivi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:20px 16px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:#fff;border:1px solid #e0dfd8;border-radius:12px;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:700}
.sync-badge{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid}
.sync-badge.ok{background:#d8f0c0;color:#2d6a1a;border-color:#7fbc5a}
.sync-badge.loading{background:#ffedc0;color:#7a4a0a;border-color:#e0b060}
.sync-badge.error{background:#ffd8d8;color:#a02020;border-color:#f09595}
.sync-badge.offline{background:#e8e6e0;color:#666;border-color:#ccc}
.nav-tabs{display:flex;gap:4px}
.tab-btn{padding:7px 14px;border:1px solid #e0dfd8;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;color:#666;transition:all .15s}
.tab-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tab-btn:hover:not(.active){background:#f5f4f0}
.content{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:20px}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.metric{background:#f5f4f0;border-radius:8px;padding:14px}
.metric-label{font-size:11px;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.metric-value{font-size:22px;font-weight:700}
.metric-value.green{color:#2d6a1a}
.metric-value.amber{color:#7a4a0a}
/* FILTERS BAR */
.filters-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.month-select{padding:5px 10px;border:1px solid #e0dfd8;border-radius:20px;background:#fff;font-size:12px;color:#555;cursor:pointer}
.filter-chip{padding:4px 12px;border:1px solid #e0dfd8;border-radius:20px;background:transparent;cursor:pointer;font-size:12px;color:#666}
.filter-chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
/* BUTTONS */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.section-title{font-size:14px;font-weight:600}
.section-actions{display:flex;gap:6px}
.btn-primary{padding:8px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500}
.btn-primary:hover{background:#333}
.btn-ghost{padding:6px 12px;background:transparent;border:1px solid #ccc;border-radius:8px;cursor:pointer;font-size:13px;color:#555}
.btn-ghost:hover{background:#f5f4f0}
.btn-green{padding:6px 12px;background:transparent;border:1px solid #7fbc5a;border-radius:8px;cursor:pointer;font-size:13px;color:#2d6a1a}
.btn-green:hover{background:#d8f0c0}
.btn-sm{padding:5px 10px;font-size:12px}
/* QUOTE CARDS */
.quotes-list{display:flex;flex-direction:column;gap:8px}
.quote-card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:13px 16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;cursor:pointer;transition:border-color .15s}
.quote-card:hover{border-color:#999}
.quote-meta{font-size:12px;color:#888;margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.quote-title{font-size:14px;font-weight:500}
.quote-right{text-align:right}
.quote-amount{font-size:15px;font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-top:5px}
.badge-bozza{background:#e8e6e0;color:#555}
.badge-inviato{background:#dbeeff;color:#1a5fa0}
.badge-accettato{background:#d8f0c0;color:#2d6a1a}
.badge-rifiutato{background:#ffd8d8;color:#a02020}
.badge-scaduto{background:#ffedc0;color:#7a4a0a}
.empty-state{text-align:center;padding:40px;color:#999;font-size:13px;line-height:1.8}
/* FORM */
.form-container{max-width:780px}
.form-section{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:18px;margin-bottom:14px}
.form-section-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0efe8}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;color:#777;font-weight:500}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fafaf8;color:#1a1a1a;font-size:13px;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#999;background:#fff}
textarea{resize:vertical;min-height:65px}
/* VOCI */
.cat-group{margin-bottom:16px}
.cat-group-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;padding:6px 0;border-bottom:1px solid #f0efe8;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.voci-header{display:grid;grid-template-columns:2.5fr 0.8fr 1fr 1fr auto;gap:8px;font-size:11px;color:#bbb;padding:0 0 4px;margin-bottom:2px}
.voce-row{display:grid;grid-template-columns:2.5fr 0.8fr 1fr 1fr auto;gap:8px;align-items:center;padding:5px 0}
.voce-total{font-weight:700;font-size:13px;text-align:right}
.btn-remove{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:0 2px;line-height:1}
.btn-remove:hover{color:#c00}
.btn-add-voce{background:none;border:1px dashed #ddd;border-radius:8px;cursor:pointer;color:#aaa;font-size:12px;padding:7px;width:100%;margin-top:6px;text-align:center}
.btn-add-voce:hover{background:#f5f4f0;border-color:#bbb;color:#666}
/* TARIFFA PICKER */
.tariffa-picker{background:#f8f8f6;border:1px solid #e0dfd8;border-radius:10px;padding:12px;margin-bottom:10px}
.tariffa-picker-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.tariffe-chips{display:flex;flex-wrap:wrap;gap:6px}
.tariffa-chip{padding:5px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;color:#555;transition:all .12s}
.tariffa-chip:hover{border-color:#1a1a1a;color:#1a1a1a;background:#f5f4f0}
/* DELIVERABLES */
.deliverable-card{background:#f8f8f6;border:1px solid #e0dfd8;border-radius:10px;padding:14px;margin-bottom:10px;position:relative}
.deliverable-remove{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;line-height:1}
.deliverable-remove:hover{color:#c00}
.deliverable-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
/* TOTAL BOX */
.total-box{background:#f5f4f0;border-radius:10px;padding:14px 16px;margin-top:14px}
.total-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.total-row.final{font-size:17px;font-weight:700;padding-top:8px;margin-top:6px;border-top:1px solid #e0dfd8}
/* DETAIL */
.detail-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.detail-back{background:none;border:1px solid #ccc;border-radius:8px;cursor:pointer;padding:6px 12px;font-size:13px;color:#555}
.detail-back:hover{background:#f5f4f0}
.detail-title{font-size:20px;font-weight:700;margin-bottom:3px}
.detail-sub{font-size:12px;color:#888}
.detail-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.status-select{border:1px solid #ddd;background:#fafaf8;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
.detail-grid{display:grid;grid-template-columns:1fr 280px;gap:16px}
.detail-card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:16px;margin-bottom:10px}
.detail-section-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0efe8}
.detail-cat-title{font-size:12px;font-weight:700;color:#555;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.04em}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f4f0;font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-row-label{color:#888}
.detail-row.bold{font-weight:700;font-size:15px}
.detail-row.total-line{border-top:1px solid #e0dfd8;margin-top:4px;padding-top:8px;font-weight:700;font-size:15px}
.detail-row.indent{padding-left:12px}
.deliverable-detail{background:#f8f8f6;border-radius:8px;padding:12px;margin-bottom:8px}
.deliverable-detail-title{font-size:13px;font-weight:600;margin-bottom:4px}
.deliverable-detail-desc{font-size:12px;color:#888;line-height:1.6;margin-bottom:6px}
.deliverable-detail-meta{display:flex;gap:16px;font-size:12px;color:#555}
/* SIGNATURE */
.signature-area{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:30px;padding-top:20px;border-top:1px solid #e0dfd8}
.signature-box{display:flex;flex-direction:column;gap:8px}
.signature-line{border-top:1px solid #1a1a1a;padding-top:6px;font-size:11px;color:#888}
/* TARIFFE PAGE */
.tariffe-table{width:100%;border-collapse:collapse;font-size:13px}
.tariffe-table th{text-align:left;font-size:11px;color:#999;font-weight:600;padding:6px 10px;border-bottom:2px solid #f0efe8;text-transform:uppercase;letter-spacing:.04em}
.tariffe-table td{padding:9px 10px;border-bottom:1px solid #f5f4f0;vertical-align:middle}
.tariffe-table tr:last-child td{border-bottom:none}
.tariffe-table tr:hover td{background:#fafaf8}
.tariffa-actions-cell{display:flex;gap:4px;justify-content:flex-end}
.btn-icon{background:none;border:none;cursor:pointer;font-size:13px;color:#aaa;padding:3px 6px;border-radius:5px}
.btn-icon:hover{background:#f0efe8;color:#333}
.btn-icon.danger:hover{background:#ffd8d8;color:#c00}
.editing-row td{background:#fffdf5!important}
.inline-input{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit;background:#fff}
.cat-label-pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;background:#f0efe8;color:#666;margin:14px 0 8px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
/* SETTINGS */
.setting-card{background:#f8f8f6;border:1px solid #e0dfd8;border-radius:10px;padding:16px;margin-bottom:12px}
.setting-card-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
/* PRINT */
@media print{
  @page{margin:0;size:A4}
  body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:1.5cm}
  .topbar,.nav-tabs,.btn-primary,.btn-ghost,.btn-green,.detail-back,.detail-actions,.no-print{display:none!important}
  .content{border:none!important;padding:0!important;background:transparent!important}
  .print-header{display:block!important}
  .app{padding:0!important;max-width:100%!important;background:transparent!important}
}
.print-header{display:none}
@media(max-width:640px){
  .metrics{grid-template-columns:1fr 1fr}
  .form-grid,.form-grid-3,.detail-grid,.deliverable-grid,.signature-area{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .voci-header,.voce-row{grid-template-columns:2fr 0.7fr 1fr auto}
  .tab-btn{padding:6px 10px;font-size:12px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Gestione Preventivi</span>
      <span class="sync-badge offline" id="sync-badge">Connessione...</span>
    </div>
    <div class="nav-tabs" id="nav-tabs">
      <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab-btn" onclick="switchTab('nuovo')">+ Nuovo</button>
      <button class="tab-btn" onclick="switchTab('tariffe')">Tariffe</button>
      <button class="tab-btn" onclick="switchTab('impostazioni')">⚙</button>
    </div>
  </div>
  <div class="content" id="content"><div class="empty-state">Connessione al database...</div></div>
</div>
<script>
const SUPABASE_URL='https://rnutpkctgqasrcksrmrv.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJudXRwa2N0Z3Fhc3Jja3NybXJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzAyMjYsImV4cCI6MjA4OTUwNjIyNn0.oIaLD4Yc7cLjx9VSQtPLHalW3UkZpAh3BJDimucqLU4';
const CATEGORIE=['Pre-produzione','Riprese','Post-produzione','Extra','Gestione'];
const STATI=['bozza','inviato','accettato','rifiutato','scaduto'];
const MESI=['Tutti i mesi','Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
let sb,currentTab='dashboard',editingId=null,viewingId=null,filterStatus='tutti',filterMonth=0;
let cachedData=[],cachedTariffe=[],editingTariffaId=null,formVoci=[],formDeliverables=[];

function getAnagrafica(){try{return JSON.parse(localStorage.getItem('anagrafica_v1')||'{}')}catch{return{}}}
function saveAnagrafica(a){localStorage.setItem('anagrafica_v1',JSON.stringify(a))}

async function init(){
  setSyncBadge('loading','Connessione...');
  document.getElementById('content').innerHTML='<div class="empty-state">Connessione al database...<br><small style="color:#bbb">Se impiega piu di 30 secondi il progetto Supabase potrebbe essere in pausa.</small></div>';
  const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),20000));
  try{
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    await Promise.race([loadAll(),timeout]);
    setSyncBadge('ok','Sincronizzato');
    switchTab('dashboard');
  }catch(e){
    const msg=e.message==='timeout'?'Progetto Supabase in pausa. Vai su supabase.com, apri il progetto e clicca Restore project, poi ricarica.':e.message;
    setSyncBadge('error','Errore connessione');
    document.getElementById('content').innerHTML='<div class="empty-state"><div style="font-size:15px;font-weight:600;margin-bottom:12px">Database non raggiungibile</div><div style="font-size:13px;color:#888;max-width:400px;margin:0 auto;line-height:1.7">'+msg+'</div><button onclick="location.reload()" style="margin-top:20px;padding:9px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">Riprova</button></div>';
  }
}

async function loadAll(){
  const[pRes,tRes]=await Promise.all([
    sb.from('preventivi').select('*').order('created_at',{ascending:false}),
    sb.from('tariffe').select('*').order('id')
  ]);
  if(pRes.error)throw pRes.error;
  if(tRes.error)throw tRes.error;
  cachedData=pRes.data.map(r=>({...r.payload,_dbid:r.id,created_at:r.created_at}));
  if(!tRes.data.length){
    const dt=defaultTariffe();
    await sb.from('tariffe').insert(dt.map(t=>({payload:t})));
    const r2=await sb.from('tariffe').select('*').order('id');
    cachedTariffe=r2.data.map(r=>({...r.payload,_dbid:r.id}));
  }else{
    cachedTariffe=tRes.data.map(r=>({...r.payload,_dbid:r.id}));
  }
}

function setSyncBadge(state,text){const el=document.getElementById('sync-badge');el.className='sync-badge '+state;el.textContent=text}

function defaultTariffe(){return[
  {id:1,nome:'Operatore / Giornata intera',rate:600,unit:'giorno',categoria:'Riprese'},
  {id:2,nome:'Operatore / Mezza giornata',rate:350,unit:'mezza giornata',categoria:'Riprese'},
  {id:3,nome:'Sony FX3 + kit ottiche',rate:150,unit:'giorno',categoria:'Riprese'},
  {id:4,nome:'Gimbal + accessori',rate:50,unit:'giorno',categoria:'Riprese'},
  {id:5,nome:'Drone operator',rate:400,unit:'giorno',categoria:'Riprese'},
  {id:6,nome:'Assistente set',rate:200,unit:'giorno',categoria:'Riprese'},
  {id:7,nome:'Noleggio attrezzatura personale',rate:200,unit:'giorno',categoria:'Riprese'},
  {id:8,nome:'Montaggio',rate:400,unit:'giorno',categoria:'Post-produzione'},
  {id:9,nome:'Color grading',rate:250,unit:'giorno',categoria:'Post-produzione'},
  {id:10,nome:'Motion graphics',rate:350,unit:'giorno',categoria:'Post-produzione'},
  {id:11,nome:'Sound design',rate:200,unit:'giorno',categoria:'Post-produzione'},
  {id:12,nome:'Concept / Regia',rate:400,unit:'giorno',categoria:'Pre-produzione'},
  {id:13,nome:'Sopralluogo',rate:120,unit:'volta',categoria:'Pre-produzione'},
  {id:14,nome:'Storyboard',rate:200,unit:'volta',categoria:'Pre-produzione'},
  {id:15,nome:'Trasferta (>50km)',rate:80,unit:'giorno',categoria:'Extra'},
  {id:16,nome:'Diritti musicali',rate:150,unit:'brano',categoria:'Extra'},
  {id:17,nome:'Gestione progetto',rate:100,unit:'ora',categoria:'Gestione'},
]}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function newVoce(n='',q=1,r=0,c='Riprese'){return{id:genId(),nome:n,qta:q,rate:r,categoria:c}}
function newDeliverable(){return{id:genId(),titolo:'',descrizione:'',costo:0,revisioni:1}}
function voceTotal(v){return parseFloat(v.qta||0)*parseFloat(v.rate||0)}
function vociTotal(voci){return(voci||[]).reduce((s,v)=>s+voceTotal(v),0)}
function deliverablesTotal(dels){return(dels||[]).reduce((s,d)=>s+parseFloat(d.costo||0),0)}
function prevTotal(p){return vociTotal(p.voci)+deliverablesTotal(p.deliverables)}
function fmt(n){return'€ '+Math.round(n).toLocaleString('it-IT')}
function fmtDate(s){if(!s)return'—';try{const d=new Date(s);return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})}catch{return s}}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function getNextNumero(){
  const nums=cachedData.map(p=>{const m=String(p.numero||'').match(/(\d+)$/);return m?parseInt(m[1]):0});
  const max=nums.length?Math.max(...nums):0;
  return'PRE-'+String(max+1).padStart(3,'0');
}

function switchTab(t){
  currentTab=t;editingId=null;viewingId=null;editingTariffaId=null;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['dashboard','nuovo','tariffe','impostazioni'][i]===t));
  render();
}

function render(){
  const el=document.getElementById('content');
  if(viewingId){el.innerHTML=renderDetail();return}
  if(currentTab==='dashboard')el.innerHTML=renderDashboard();
  else if(currentTab==='nuovo')el.innerHTML=renderForm();
  else if(currentTab==='tariffe')el.innerHTML=renderTariffe();
  else if(currentTab==='impostazioni')el.innerHTML=renderImpostazioni();
}

/* ── DASHBOARD ── */
function renderDashboard(){
  let data=cachedData;

  // month filter
  if(filterMonth>0){
    data=data.filter(p=>{
      if(!p.data)return false;
      return new Date(p.data).getMonth()+1===filterMonth;
    });
  }

  const filtered=filterStatus==='tutti'?data:data.filter(p=>p.stato===filterStatus);
  const totAcc=data.filter(p=>p.stato==='accettato').reduce((s,p)=>s+prevTotal(p),0);
  const totInv=data.filter(p=>p.stato==='inviato').reduce((s,p)=>s+prevTotal(p),0);

  const monthOpts=MESI.map((m,i)=>`<option value="${i}" ${filterMonth===i?'selected':''}>${m}</option>`).join('');
  const chips=['tutti',...STATI].map(s=>`<button class="filter-chip ${filterStatus===s?'active':''}" onclick="setFilter('${s}')">${s}</button>`).join('');

  const cards=filtered.length?[...filtered].map(p=>{
    const tot=prevTotal(p);
    return`<div class="quote-card" onclick="viewQuote('${p._dbid}')">
      <div><div class="quote-title">${esc(p.titolo)||'Senza titolo'}</div>
      <div class="quote-meta"><span>${esc(p.cliente)||'—'}</span><span>N° ${esc(p.numero)}</span><span>${fmtDate(p.data)}</span><span>${esc(p.tipo)||''}</span></div></div>
      <div class="quote-right"><div class="quote-amount">${fmt(tot)}</div><div><span class="badge badge-${p.stato}">${p.stato}</span></div></div>
    </div>`;
  }).join(''):`<div class="empty-state">Nessun preventivo trovato.</div>`;

  return`
    <div class="metrics">

/* ── EXCEL ── */
function exportExcel(){
  const data=cachedData;
  if(!data.length){alert('Nessun preventivo da esportare.');return}
  const rows=data.map(p=>{const tot=prevTotal(p);return{'N°':p.numero||'','Data':p.data||'','Cliente':p.cliente||'','Titolo':p.titolo||'','Tipo':p.tipo||'','Stato':p.stato||'','Totale (€)':Math.round(tot),'Anticipo %':p.anticipo||50,'Anticipo (€)':Math.round(tot*(parseFloat(p.anticipo)||50)/100),'Saldo (€)':Math.round(tot-tot*(parseFloat(p.anticipo)||50)/100),'Consegna':p.consegna||''}});
  const voci=[];
  data.forEach(p=>{(p.voci||[]).forEach(v=>{voci.push({'N°':p.numero||'','Cliente':p.cliente||'','Categoria':v.categoria||'','Voce':v.nome||'','Qtà':v.qta||0,'Tariffa':v.rate||0,'Totale':Math.round(voceTotal(v))})})});
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Storico');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(voci),'Voci');
  XLSX.writeFile(wb,`preventivi_${new Date().toISOString().split('T')[0]}.xlsx`);
}

function addVoceDaTariffa(tariffaId){
  const t=cachedTariffe.find(x=>(x._dbid||x.id)==tariffaId);
  if(!t)return;
  formVoci.push(newVoce(t.nome,1,t.rate,t.categoria));
  refreshVociContainer();
}
function addVoce(cat){formVoci.push(newVoce('',1,0,cat||'Riprese'));refreshVociContainer()}
function removeVoce(id){formVoci=formVoci.filter(v=>v.id!==id);refreshVociContainer()}
function updateVoce(id,f,val){
  const v=formVoci.find(x=>x.id===id);if(!v)return;
  v[f]=(f==='qta'||f==='rate')?parseFloat(val)||0:val;
  const el=document.getElementById('vt_'+id);if(el)el.textContent=fmt(voceTotal(v));
  updateTotals();
}
function refreshVociContainer(){
  const c=document.getElementById('voci-container');
  if(!c)return;
  // rebuild only voci rows, not full form
  const vByCat={};CATEGORIE.forEach(cat=>vByCat[cat]=formVoci.filter(v=>v.categoria===cat));
  CATEGORIE.forEach(cat=>{
    const cg=c.querySelector(`[data-cat="${cat}"]`);
    if(!cg)return;
    const rows=vByCat[cat].map(v=>`
      <div class="voce-row" id="vr_${v.id}">
        <input style="font-size:12px" value="${esc(v.nome)}" placeholder="Descrizione..." onchange="updateVoce('${v.id}','nome',this.value)">
        <input type="number" value="${v.qta}" min="0.5" step="0.5" style="font-size:12px" onchange="updateVoce('${v.id}','qta',this.value)">
        <input type="number" value="${v.rate}" placeholder="€" style="font-size:12px" onchange="updateVoce('${v.id}','rate',this.value)">
        <span class="voce-total" id="vt_${v.id}">${fmt(voceTotal(v))}</span>
        <button class="btn-remove" onclick="removeVoce('${v.id}')">×</button>
      </div>`).join('');
    cg.innerHTML=(rows?`<div class="voci-header"><span>Descrizione</span><span>Qtà</span><span>Tariffa</span><span>Totale</span><span></span></div>`+rows:'');
  });
  updateTotals();
}

function addDeliverable(){formDeliverables.push(newDeliverable());refreshDeliverables()}
function removeDeliverable(id){formDeliverables=formDeliverables.filter(d=>d.id!==id);refreshDeliverables()}
function updateDel(id,f,val){
  const d=formDeliverables.find(x=>x.id===id);if(!d)return;
  d[f]=(f==='costo'||f==='revisioni')?parseFloat(val)||0:val;
  updateTotals();
}
function refreshDeliverables(){
  const c=document.getElementById('deliverables-container');if(!c)return;
  c.innerHTML=(formDeliverables||[]).map(d=>`
    <div class="deliverable-card" id="del_${d.id}">
      <button class="deliverable-remove" onclick="removeDeliverable('${d.id}')">×</button>
      <div class="form-group"><label>Titolo deliverable</label><input value="${esc(d.titolo)}" placeholder="es. Video principale 60s" onchange="updateDel('${d.id}','titolo',this.value)"></div>
      <div class="deliverable-grid">

        <div>
          <div class="form-group" style="margin-bottom:10px"><label>Costo (€)</label><input type="number" value="${d.costo}" onchange="updateDel('${d.id}','costo',this.value)"></div>

      </div>
    </div>`).join('');
  updateTotals();
}

function updateTotals(){
  const sv=vociTotal(formVoci);
  const sd=deliverablesTotal(formDeliverables);
  const tot=sv+sd;
  const pct=parseFloat(document.getElementById('f_anticipo')?.value||50);
  const anticipo=tot*pct/100;
  const el=id=>document.getElementById(id);
  if(el('fst-voci'))el('fst-voci').textContent=fmt(sv);
  if(el('fst-del'))el('fst-del').textContent=fmt(sd);
  if(el('tot-total'))el('tot-total').textContent=fmt(tot);
  if(el('tot-anticipo'))el('tot-anticipo').textContent=fmt(anticipo);
  if(el('tot-saldo'))el('tot-saldo').textContent=fmt(tot-anticipo);
}

function getFormData(){
  const g=id=>{const el=document.getElementById('f_'+id);return el?el.value:''};
  return{titolo:g('titolo'),cliente:g('cliente'),clienteEmail:g('clienteEmail'),numero:g('numero'),data:g('data'),scadenza:g('scadenza'),tipo:g('tipo'),location:g('location'),giornate:g('giornate'),anticipo:g('anticipo'),consegna:g('consegna'),note:g('note'),esclusioni:g('esclusioni'),voci:formVoci,deliverables:formDeliverables};
}

async function savePreventivo(stato){
  const fd=getFormData();
  if(!fd.titolo&&!fd.cliente){alert('Inserisci almeno il titolo o il cliente.');return}
  setSyncBadge('loading','Salvataggio...');
  try{
    if(editingId){
      const idx=cachedData.findIndex(p=>p._dbid==editingId);
      if(idx>=0){
        const updated={...cachedData[idx],...fd};
        if(stato==='inviato')updated.stato='inviato';
        cachedData[idx]=updated;
        const payload={...updated};delete payload._dbid;delete payload.created_at;
        await sb.from('preventivi').update({payload}).eq('id',editingId);
      }
    }else{
      const payload={id:genId(),...fd,stato};
      const{data:row,error}=await sb.from('preventivi').insert({payload}).select().single();
      if(error)throw error;
      cachedData.unshift({...payload,_dbid:row.id,created_at:row.created_at});
    }
    setSyncBadge('ok','Sincronizzato ☁');
    editingId=null;filterStatus='tutti';switchTab('dashboard');
  }catch(e){setSyncBadge('error','Errore');alert('Errore: '+e.message)}
}

        +'<div class="signature-box"><div style="height:50px"></div>'
          +'<div class="signature-line">'+(an.nome?esc(an.nome)+' '+esc(an.cognome):'Firma del fornitore')+'</div>'
        +'</div>'
        +'<div class="signature-box"><div style="height:50px"></div>'
          +'<div class="signature-line">'+esc(p.cliente||'Firma del cliente')+' \u2014 Per accettazione</div>'
        +'</div>'
      +'</div>'

    +'</div>'
  +'</div>';

function printPrev(){window.print()}

function backToDash(){viewingId=null;currentTab='dashboard';render()}
function viewQuote(id){viewingId=id;render()}

async function updateStatus(dbid,stato){
  const idx=cachedData.findIndex(p=>p._dbid==dbid);
  if(idx<0)return;
  cachedData[idx].stato=stato;
  const payload={...cachedData[idx]};delete payload._dbid;delete payload.created_at;
  await sb.from('preventivi').update({payload}).eq('id',dbid);
  setSyncBadge('ok','Sincronizzato ☁');
}

async function deleteQuote(dbid){
  if(!confirm('Eliminare questo preventivo?'))return;
  cachedData=cachedData.filter(p=>p._dbid!=dbid);
  await sb.from('preventivi').delete().eq('id',dbid);
  backToDash();
}

function editQuote(dbid){
  const p=cachedData.find(x=>x._dbid==dbid);if(!p)return;
  editingId=dbid;
  formVoci=(p.voci||[]).map(v=>({...v}));
  formDeliverables=(p.deliverables||[]).map(d=>({...d}));
  viewingId=null;currentTab='nuovo';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===1));
  render();
  setTimeout(()=>{
    const fields=['titolo','cliente','clienteEmail','numero','data','scadenza','tipo','location','giornate','anticipo','consegna','note','esclusioni'];
    fields.forEach(f=>{const el=document.getElementById('f_'+f);if(el&&p[f]!=null)el.value=p[f]});
  },50);
}

/* ── TARIFFE ── */
function renderTariffe(){
  const bycat={};CATEGORIE.forEach(c=>bycat[c]=cachedTariffe.filter(t=>t.categoria===c));
  const secs=CATEGORIE.map(cat=>{
    const rows=bycat[cat].map(t=>{
      const dbid=t._dbid||t.id;
      if(editingTariffaId==dbid)return`<tr class="editing-row">
        <td><input class="inline-input" id="et_nome" value="${esc(t.nome)}"></td>
        <td><input class="inline-input" id="et_rate" type="number" value="${t.rate}" style="width:90px"></td>
        <td><input class="inline-input" id="et_unit" value="${esc(t.unit)}" style="width:80px"></td>
        <td><select class="inline-input" id="et_cat" style="width:120px">${CATEGORIE.map(c=>`<option ${t.categoria===c?'selected':''}>${c}</option>`).join('')}</select></td>
        <td><div class="tariffa-actions-cell">
          <button class="btn-icon" onclick="saveTariffaEdit('${dbid}')" style="color:#2d6a1a">✓</button>
          <button class="btn-icon" onclick="cancelTariffaEdit()">✕</button>
        </div></td></tr>`;
      return`<tr>
        <td>${esc(t.nome)}</td>
        <td style="font-weight:700;color:#185FA5">${fmt(t.rate)}</td>
        <td style="color:#999">/ ${esc(t.unit)}</td>
        <td style="color:#888;font-size:12px">${esc(t.categoria)}</td>
        <td><div class="tariffa-actions-cell">
          <button class="btn-icon" onclick="startEditTariffa('${dbid}')">✎</button>
          <button class="btn-icon danger" onclick="deleteTariffa('${dbid}')">✕</button>
        </div></td></tr>`;
    }).join('');
    if(!rows)return'';
    return`<div><span class="cat-label-pill">${cat}</span>
      <table class="tariffe-table"><thead><tr><th>Nome</th><th>Tariffa</th><th>Unità</th><th>Categoria</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }).join('');

  return`<div>
    <div class="section-header" style="margin-bottom:4px">
      <span class="section-title">Libreria tariffe</span>
      <button class="btn-ghost btn-sm" onclick="showAddTariffa()">+ Nuova tariffa</button>
    </div>
    <p style="font-size:12px;color:#999;margin-bottom:12px">Le tariffe sono disponibili come scorciatoia nel form nuovo preventivo.</p>
    ${secs}
    <div id="add-tf" style="display:none;margin-top:16px" class="form-section">
      <div class="form-section-title">Nuova tariffa</div>
      <div class="form-grid">
        <div class="form-group"><label>Nome</label><input id="nt_nome" placeholder="es. Noleggio slider"></div>
        <div class="form-group"><label>Categoria</label><select id="nt_cat">${CATEGORIE.map(c=>`<option>${c}</option>`).join('')}</select></div>
        <div class="form-group"><label>Tariffa (€)</label><input id="nt_rate" type="number" placeholder="0"></div>
        <div class="form-group"><label>Unità</label><input id="nt_unit" placeholder="giorno / ora / volta"></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn-primary" onclick="addNewTariffa()">Salva</button>
        <button class="btn-ghost" onclick="document.getElementById('add-tf').style.display='none'">Annulla</button>
      </div>
    </div>
  </div>`;
}

function showAddTariffa(){document.getElementById('add-tf').style.display='block'}
async function addNewTariffa(){
  const nome=document.getElementById('nt_nome').value.trim();
  const cat=document.getElementById('nt_cat').value;
  const rate=parseFloat(document.getElementById('nt_rate').value)||0;
  const unit=document.getElementById('nt_unit').value.trim();
  if(!nome){alert('Inserisci un nome.');return}
  const payload={id:genId(),nome,categoria:cat,rate,unit};
  const{data:row,error}=await sb.from('tariffe').insert({payload}).select().single();
  if(error){alert('Errore: '+error.message);return}
  cachedTariffe.push({...payload,_dbid:row.id});
  render();
}
function startEditTariffa(id){editingTariffaId=id;render()}
function cancelTariffaEdit(){editingTariffaId=null;render()}
async function saveTariffaEdit(dbid){
  const nome=document.getElementById('et_nome').value.trim();
  const rate=parseFloat(document.getElementById('et_rate').value)||0;
  const unit=document.getElementById('et_unit').value.trim();
  const cat=document.getElementById('et_cat').value;
  if(!nome){alert('Nome obbligatorio.');return}
  const idx=cachedTariffe.findIndex(x=>(x._dbid||x.id)==dbid);
  if(idx>=0){cachedTariffe[idx]={...cachedTariffe[idx],nome,rate,unit,categoria:cat};const p={...cachedTariffe[idx]};delete p._dbid;await sb.from('tariffe').update({payload:p}).eq('id',dbid)}
  editingTariffaId=null;render();
}
async function deleteTariffa(dbid){
  if(!confirm('Eliminare questa tariffa?'))return;
  cachedTariffe=cachedTariffe.filter(t=>(t._dbid||t.id)!=dbid);
  await sb.from('tariffe').delete().eq('id',dbid);
  render();
}

      <div class="form-grid">
        <div class="form-group"><label>Nome</label><input id="an_nome" value="${esc(an.nome||'')}"></div>

        <div class="form-group"><label>P.IVA</label><input id="an_piva" value="${esc(an.piva||'')}"></div>

        <div class="form-group"><label>Telefono</label><input id="an_telefono" value="${esc(an.telefono||'')}"></div>

      <div class="setting-card-title">Database</div>
      <p style="font-size:12px;color:#888;margin-bottom:12px;line-height:1.6">Connesso a Supabase. I dati sono sincronizzati su tutti i tuoi dispositivi.</p>

function salvaAnagrafica(){
  const g=id=>document.getElementById(id)?.value||'';
  saveAnagrafica({nome:g('an_nome'),cognome:g('an_cognome'),piva:g('an_piva'),email:g('an_email'),indirizzo:g('an_indirizzo'),telefono:g('an_telefono')});
  alert('Anagrafica salvata.');
}

init();
</script>
